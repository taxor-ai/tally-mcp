type: list
items_xpath: //COLLECTION/VOUCHER
result_key: vouchers
fields:
  voucher_number:
    xpath: VOUCHERNUMBER
  date:
    xpath: DATE
    transform: tally_date
  reference:
    xpath: REFERENCE
  narration:
    xpath: NARRATION
  voucher_type:
    xpath: VOUCHERTYPENAME
  ledger_entries:
    items_xpath: ALLLEDGERENTRIES.LIST
    fields:
      ledger_name:
        xpath: LEDGERNAME
      amount:
        xpath: AMOUNT
        transform: number
      debit_credit:
        xpath: ISDEEMEDPOSITIVE
        transform: boolean
      date:
        xpath: DATE
        transform: tally_date
      reference:
        xpath: REFERENCE
      invoice_number:
        xpath: INVOICENUMBER
      tax_amount:
        xpath: TAXAMOUNT
        transform: number
